<!DOCTYPE html>
<html>

<head>

    <title>Customer Segmentation</title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#0f172a;
            font-family: Arial, sans-serif;
        }

        .main-card{
            border:none;
        }

        h1{
            font-weight:bold;
            color:#1e293b;
        }

        .btn-primary{
            background:#2563eb;
            border:none;
        }

        .btn-primary:hover{
            background:#1d4ed8;
        }

        .graph-image{
            border-radius:15px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.3);
        }

    </style>

</head>

<body>

<div class="container mt-5 mb-5">

    <div class="card main-card p-4 shadow-lg rounded-4">

        <h1 class="text-center mb-5">
            Customer Segmentation using K-Means
        </h1>

        <!-- ============================= -->
        <!-- FORM -->
        <!-- ============================= -->

        <form action="/predict"
              method="POST"
              enctype="multipart/form-data">

            <div class="mb-4">

                <label class="form-label fs-5">
                    Upload CSV File
                </label>

                <input type="file"
                       name="file"
                       class="form-control form-control-lg"
                       required>

            </div>

            <div class="mb-4">

                <label class="form-label fs-5">
                    Select Number of Clusters
                </label>

                <select name="clusters"
                        class="form-select form-select-lg">

                    <option value="2">2 Clusters</option>
                    <option value="3">3 Clusters</option>
                    <option value="4">4 Clusters</option>
                    <option value="5">5 Clusters</option>
                    <option value="6">6 Clusters</option>

                </select>

            </div>

            <button type="submit"
                    class="btn btn-primary btn-lg w-100">

                Generate Segmentation

            </button>

        </form>

        <!-- ============================= -->
        <!-- SUCCESS MESSAGE -->
        <!-- ============================= -->

        {% if message %}

        <div class="alert alert-success mt-4 fs-5">

            {{ message }}

        </div>

        {% endif %}

        <!-- ============================= -->
        <!-- TABLE -->
        <!-- ============================= -->

        {% if table %}

        <div class="mt-5">

            <h2 class="mb-3">
                Customer Segmentation Table
            </h2>

            <div class="table-responsive">

                {{ table | safe }}

            </div>

        </div>

        {% endif %}

        <!-- ============================= -->
        <!-- VISUALIZATION SECTION -->
        <!-- ============================= -->

        {% if table %}

        <div class="row mt-5">

            <!-- Scatter Graph -->

            <div class="col-md-6 text-center mb-4">

                <h3 class="mb-3">
                    Cluster Visualization Graph
                </h3>

                <img src="{{ url_for('static', filename='cluster_graph.png') }}"
                     class="img-fluid graph-image">

            </div>

            <!-- Pie Chart -->

            <div class="col-md-6 text-center mb-4">

                <h3 class="mb-3">
                    Cluster Distribution Pie Chart
                </h3>

                <img src="{{ url_for('static', filename='pie_chart.png') }}"
                     class="img-fluid graph-image">

            </div>

        </div>

        {% endif %}

    </div>

</div>

</body>

</html>
